<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width={{width}}, height={{height}}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .banner {
    position: relative;
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    background: #0a0a0a;
  }

  .banner__photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: {{photoPosition}};
  }

  .banner__overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: {{overlayGradient}};
  }

  .banner__accent-line {
    position: absolute;
    {{accentPosition}};
    width: {{accentWidth}};
    height: {{accentHeight}};
    background: #18AA9D;
  }

  .banner__content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: {{contentJustify}};
    padding: {{contentPadding}};
    z-index: 2;
  }

  .banner__logo {
    position: absolute;
    top: {{logoTop}};
    right: {{logoRight}};
    z-index: 3;
  }

  .banner__logo img {
    height: {{logoHeight}};
    width: auto;
  }

  .banner__discount {
    display: inline-flex;
    align-items: baseline;
    gap: {{discountGap}};
    margin-bottom: {{discountMarginBottom}};
    width: fit-content;
  }

  .banner__discount-value {
    font-weight: 900;
    font-size: {{discountFontSize}};
    color: #18AA9D;
    line-height: 0.9;
    letter-spacing: -0.03em;
  }

  .banner__discount-percent {
    font-weight: 800;
    font-size: {{discountPercentSize}};
    color: #18AA9D;
    line-height: 0.9;
  }

  .banner__badge {
    display: inline-block;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(4px);
    color: #FFFFFF;
    font-weight: 700;
    font-size: {{badgeFontSize}};
    padding: {{badgePadding}};
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: {{badgeMarginBottom}};
    width: fit-content;
  }

  .banner__claim {
    font-weight: 800;
    font-size: {{claimFontSize}};
    line-height: {{claimLineHeight}};
    color: #FFFFFF;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin-bottom: {{claimMarginBottom}};
    max-width: {{claimMaxWidth}};
  }

  .banner__subheading {
    font-weight: 400;
    font-size: {{subheadingFontSize}};
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: {{subheadingMarginBottom}};
    max-width: {{claimMaxWidth}};
    letter-spacing: 0.01em;
  }

  .banner__cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #18AA9D;
    color: #FFFFFF;
    font-weight: 700;
    font-size: {{ctaFontSize}};
    padding: {{ctaPadding}};
    border-radius: 100px;
    text-decoration: none;
    letter-spacing: 0.02em;
    width: fit-content;
    transition: background 0.2s;
  }

  .banner__cta-arrow {
    font-size: 1.1em;
  }
</style>
</head>
<body>
{{{body}}}
</body>
</html>
