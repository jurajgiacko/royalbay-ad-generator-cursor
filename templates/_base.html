<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width={{width}}, height={{height}}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rb-turquoise: #18AA9D;
    --rb-black: #000000;
    --rb-white: #FFFFFF;
    --rb-dark-gray: #1A1A1A;
    --rb-light-gray: #F5F5F5;
    --rb-overlay: rgba(0, 0, 0, 0.45);
    --rb-overlay-strong: rgba(0, 0, 0, 0.65);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    font-family: 'Montserrat', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .banner {
    position: relative;
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
  }

  .banner__photo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: {{photoPosition}};
  }

  .banner__overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: {{overlayGradient}};
  }

  .banner__content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: {{contentJustify}};
    padding: {{contentPadding}};
    z-index: 2;
  }

  .banner__logo {
    position: absolute;
    top: {{logoTop}};
    right: {{logoRight}};
    z-index: 3;
  }

  .banner__logo img {
    height: {{logoHeight}};
    width: auto;
  }

  .banner__badge {
    display: inline-block;
    background: var(--rb-turquoise);
    color: var(--rb-white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: {{badgeFontSize}};
    padding: {{badgePadding}};
    border-radius: {{badgeRadius}};
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: {{badgeMarginBottom}};
    width: fit-content;
  }

  .banner__claim {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: {{claimFontSize}};
    line-height: {{claimLineHeight}};
    color: var(--rb-white);
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin-bottom: {{claimMarginBottom}};
    max-width: {{claimMaxWidth}};
  }

  .banner__subheading {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: {{subheadingFontSize}};
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: {{subheadingMarginBottom}};
    max-width: {{claimMaxWidth}};
  }

  .banner__cta {
    display: inline-block;
    background: var(--rb-turquoise);
    color: var(--rb-white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: {{ctaFontSize}};
    padding: {{ctaPadding}};
    border-radius: {{ctaRadius}};
    text-decoration: none;
    text-transform: none;
    letter-spacing: 0.02em;
    width: fit-content;
  }
</style>
</head>
<body>
{{{body}}}
</body>
</html>
