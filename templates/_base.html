<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width={{width}}, height={{height}}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .banner {
    position: relative;
    width: {{width}}px;
    height: {{height}}px;
    overflow: hidden;
    background: #2a2a2a;
  }

  .banner__photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: {{photoPosition}};
  }

  .banner__overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: {{overlayGradient}};
  }

  .banner__logo {
    position: absolute;
    top: {{logoTop}};
    left: {{logoLeft}};
    z-index: 3;
  }

  .banner__logo img {
    height: {{logoHeight}};
    width: auto;
    filter: drop-shadow(0 1px 4px rgba(0, 0, 0, 0.4));
  }

  .banner__discount-circle {
    position: absolute;
    top: {{discountCircleTop}};
    right: {{discountCircleRight}};
    width: {{discountCircleSize}};
    height: {{discountCircleSize}};
    background: #e8175d;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3;
  }

  .banner__discount-circle-value {
    font-weight: 900;
    font-size: {{discountValueSize}};
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .banner__discount-circle-label {
    font-weight: 700;
    font-size: {{discountLabelSize}};
    color: #FFFFFF;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1;
    margin-top: 2px;
  }

  .banner__content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: {{contentJustify}};
    padding: {{contentPadding}};
    z-index: 2;
  }

  .banner__badge {
    display: inline-block;
    background: #e8740e;
    color: #FFFFFF;
    font-weight: 800;
    font-size: {{badgeFontSize}};
    padding: {{badgePadding}};
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: {{badgeMarginBottom}};
    width: fit-content;
  }

  .banner__claim {
    font-weight: 800;
    font-size: {{claimFontSize}};
    line-height: {{claimLineHeight}};
    color: #FFFFFF;
    margin-bottom: {{claimMarginBottom}};
    max-width: {{claimMaxWidth}};
  }

  .banner__claim strong {
    font-weight: 900;
  }

  .banner__subheading {
    font-weight: 400;
    font-size: {{subheadingFontSize}};
    color: rgba(255, 255, 255, 0.8);
    font-style: italic;
    margin-bottom: {{subheadingMarginBottom}};
    max-width: {{claimMaxWidth}};
  }

  .banner__cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #18AA9D;
    color: #FFFFFF;
    font-weight: 700;
    font-size: {{ctaFontSize}};
    padding: {{ctaPadding}};
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 0.02em;
    width: fit-content;
  }

  .banner__cta-arrow {
    font-size: 1.1em;
  }

  .banner__footer {
    position: absolute;
    bottom: {{footerBottom}};
    right: {{footerRight}};
    font-weight: 400;
    font-size: {{footerFontSize}};
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.08em;
    z-index: 3;
  }
</style>
</head>
<body>
{{{body}}}
</body>
</html>
